name: leak-guard
on:
  pull_request:
  push:
    branches: [main]
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package with dev extras
        run: pip install -e ".[dev]"
      - name: Run leak-guard test
        run: pytest -q tests/test_leak_guard.py
