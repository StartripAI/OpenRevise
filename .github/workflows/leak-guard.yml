name: leak-guard
on:
  pull_request:
  push:
    branches: [main]
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Block sensitive tokens
        run: |
          set -e
          if git ls-files | xargs grep -lE "(PANOVA|阿片|opioid use \(ITT\)|/Users/star/)" 2>/dev/null; then
            echo "::error::leak-guard found sensitive tokens in tracked files"
            exit 1
          fi
          echo "leak-guard clean"
